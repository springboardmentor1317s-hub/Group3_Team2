<div class="auth-container">
  <mat-card class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to CampusEventHub</p>
    </div>

    <form #loginForm="ngForm">
      <!-- Email -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email Address</mat-label>
        <input matInput type="email" name="email" [(ngModel)]="email" required>
      </mat-form-field>

      <!-- Password -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" name="password" [(ngModel)]="password" required>
      </mat-form-field>

      <!-- Role -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Login As</mat-label>
        <mat-select [(ngModel)]="role" name="role" required>
          <mat-option value="student">Student</mat-option>
          <mat-option value="college-admin">College Admin</mat-option>
          <mat-option value="super-admin">Super Admin</mat-option>
        </mat-select>
      </mat-form-field>

      <!-- Login Button -->
      <button mat-raised-button color="primary" class="full-width login-btn" (click)="login()">
        Login
      </button>

      <p class="switch-text">
        Don’t have an account? <a routerLink="/register">Sign Up</a>
      </p>
    </form>
  </mat-card>
</div>
