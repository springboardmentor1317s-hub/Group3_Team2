<!DOCTYPE html>
<html>
<head>
    <title>Super Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1>👑 Super Admin Dashboard</h1>
    <button class="logout">Logout</button>
</div>

<div class="cards">

    <div class="card colleges">
        <h2>🏫 Colleges</h2>
        <p>10</p>
    </div>

    <div class="card admins">
        <h2>👨‍💼 Admins</h2>
        <p>5</p>
    </div>

    <div class="card students">
        <h2>🎓 Students</h2>
        <p>200</p>
    </div>

    <div class="card events">
        <h2>📅 Events</h2>
        <p>25</p>
    </div>

</div>

<div class="buttons">
    <button class="btn college-btn">Manage Colleges</button>
    <button class="btn admin-btn">Manage Admins</button>
    <button class="btn report-btn">View Reports</button>
</div>

</body>
</html>
