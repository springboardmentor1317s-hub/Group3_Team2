<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <h1>CampusEventHub - Admin Dashboard</h1>
        <button class="logout">Logout</button>
    </header>

    <div class="container">

        <h2>Welcome, Admin 👋</h2>

        <div class="cards">

            <div class="card">
                <h3>Total Events</h3>
                <p>0</p>
            </div>

            <div class="card">
                <h3>Total Registrations</h3>
                <p>0</p>
            </div>

            <div class="card">
                <h3>Active Users</h3>
                <p>0</p>
            </div>

        </div>

        <div class="buttons">
            <button>Create Event</button>
            <button>Manage Participants</button>
        </div>

        <div class="events">
            <h3>Your Events</h3>

            <table>
                <tr>
                    <th>Event Name</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>

                <tr>
                    <td>No events yet</td>
                    <td>-</td>
                    <td>-</td>
                </tr>

            </table>

        </div>

    </div>

</body>
</html>
